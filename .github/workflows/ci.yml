name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       voltfox_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/voltfox_test"
      DIRECT_URL:   "postgresql://postgres:postgres@localhost:5432/voltfox_test"
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder"
      SHARE_LINK_SECRET: "test-secret-at-least-32-characters-long"
      CBAM_DATA_VERSION: "20260204"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Apply DB schema
        run: npx prisma db push --schema packages/db/schema.prisma --skip-generate

      - name: Generate Prisma client
        run: npx prisma generate --schema packages/db/schema.prisma

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema packages/db/schema.prisma
      - name: Build API
        run: npm run build --workspace=apps/api
      - name: Build web
        run: npm run build --workspace=apps/web
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder
