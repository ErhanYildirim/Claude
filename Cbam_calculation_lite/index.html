<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CBAM Quick Calculator | Voltfox</title>
<script src="cbam-defaults.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f4fbf8;--panel:#ffffff;--panel-2:#eef7f3;
  --accent:#00b87a;--accent-2:#009966;--accent-light:#e6f9f2;
  --danger:#e05252;--warn:#d97706;--info:#2563eb;
  --text:#0a1f1a;--text-2:#1a3530;--muted:#5c7a72;
  --border:#d4ece4;--border-2:#c0ddd5;
  --shadow:0 2px 12px rgba(0,40,30,.07),0 1px 3px rgba(0,40,30,.05);
  --shadow-md:0 6px 24px rgba(0,40,30,.1),0 2px 6px rgba(0,40,30,.06);
  --nav-bg:#ffffff;--footer-bg:#0a1f1a;--footer-text:#94b3ac;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:"Manrope",system-ui,-apple-system,sans-serif;line-height:1.55;font-size:14px}
.wrap{max-width:980px;margin:0 auto;padding:0 20px 80px}

/* ── Navbar ── */
nav{background:var(--nav-bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.nav-inner{max-width:980px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;text-decoration:none;color:var(--text)}
.logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:15px}
.nav-right{display:flex;align-items:center;gap:10px}
.badge{background:var(--accent-light);color:var(--accent-2);border:1px solid rgba(0,184,122,.25);padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.3px}

/* Language toggle */
.lang-toggle{display:flex;background:var(--panel-2);border:1px solid var(--border-2);border-radius:999px;padding:3px;gap:2px}
.lang-btn{padding:5px 14px;border-radius:999px;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.lang-btn.active{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(0,184,122,.3)}
.lang-btn:not(.active):hover{color:var(--text)}

/* ── Hero ── */
.hero{text-align:center;padding:52px 20px 44px;background:linear-gradient(180deg,#eaf7f1 0%,var(--bg) 100%)}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);border:1px solid rgba(0,184,122,.2);color:var(--accent-2);padding:4px 14px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.4px;margin-bottom:18px}
.hero h1{font-size:clamp(26px,4vw,42px);font-weight:800;line-height:1.15;margin-bottom:12px;color:var(--text)}
.accent{color:var(--accent)}
.hero p{color:var(--muted);font-size:15px;max-width:560px;margin:0 auto;font-weight:500}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;padding-top:28px}
@media(max-width:760px){.layout{grid-template-columns:1fr}}

/* ── Card ── */
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:var(--shadow)}

/* ── Form ── */
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--accent-2);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sec-label:first-child{margin-top:0}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
select,input[type=number]{width:100%;padding:10px 12px;background:var(--panel-2);border:1px solid var(--border-2);border-radius:9px;color:var(--text);font-size:13px;font-weight:500;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,184,122,.12)}
.field{margin-bottom:14px}
.hint{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.row2{grid-template-columns:1fr}}

/* CN strip */
.cn-strip{background:var(--accent-light);border:1px solid rgba(0,184,122,.2);border-radius:10px;padding:10px 14px;margin-top:8px;display:none}
.cn-strip.show{display:block}
.cn-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(0,184,122,.12)}
.cn-row:last-child{border-bottom:0}
.cn-k{color:var(--muted)}
.cn-v{font-weight:700;color:var(--text-2)}

/* Slider */
.slider-wrap{background:linear-gradient(135deg,var(--accent-light),#f0fbf6);border:1px solid rgba(0,184,122,.2);border-radius:14px;padding:16px;margin-top:4px}
.slider-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.slider-pct{font-size:38px;font-weight:800;color:var(--accent);line-height:1}
input[type=range]{width:100%;height:5px;appearance:none;background:var(--border-2);border-radius:99px;outline:none;cursor:pointer;accent-color:var(--accent);border:none;margin:8px 0}
.ticks{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:600}
.ef-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:10px;margin-bottom:3px;font-weight:600}
.ef-track{background:var(--border);border-radius:99px;height:7px;overflow:hidden}
.ef-fill{height:100%;border-radius:99px;transition:width .3s}

/* ── Results empty ── */
.res-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;font-weight:500}
.res-empty .icon{font-size:32px;margin-bottom:12px;opacity:.35}

/* ── SEE cards ── */
.see-trio{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.see-card{border-radius:12px;padding:14px 10px;text-align:center;border:1px solid}
.sc-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.sc-val{font-size:22px;font-weight:800;line-height:1}
.sc-unit{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}
.sc-sub{font-size:10px;font-weight:700;margin-top:6px;padding:2px 8px;border-radius:999px;display:inline-block}
.card-red{background:#fff5f5;border-color:#fccaca}.card-red .sc-lbl,.card-red .sc-val{color:var(--danger)}.card-red .sc-sub{background:#fde8e8;color:var(--danger)}
.card-green{background:var(--accent-light);border-color:rgba(0,184,122,.25)}.card-green .sc-lbl,.card-green .sc-val{color:var(--accent-2)}.card-green .sc-sub{background:rgba(0,184,122,.15);color:var(--accent-2)}

/* ── Savings box ── */
.savings-box{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);border-radius:14px;padding:20px 16px;margin-bottom:16px;text-align:center;box-shadow:0 4px 16px rgba(0,184,122,.25)}
.sav-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.75);margin-bottom:4px}
.sav-amount{font-size:40px;font-weight:800;color:#fff;line-height:1}
.sav-sub{font-size:12px;color:rgba(255,255,255,.75);margin-top:4px;font-weight:500}

/* ── Bar chart ── */
.bar-section{margin-bottom:16px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{width:90px;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;text-align:right}
.bar-outer{flex:1;background:var(--panel-2);border:1px solid var(--border);border-radius:99px;height:22px;overflow:hidden}
.bar-inner{height:100%;border-radius:99px;display:flex;align-items:center;padding-left:8px;transition:width .4s}
.bar-inner span{font-size:10px;font-weight:800;color:rgba(255,255,255,.9);white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.2)}

/* ── KPIs ── */
.kpi-list{margin-bottom:14px}
.kpi{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border)}
.kpi:last-child{border-bottom:0}
.kpi .k{font-size:12px;color:var(--muted);font-weight:500}
.kpi .v{font-weight:700;font-size:14px;color:var(--text)}
.kpi .v small{font-size:10px;font-weight:500;color:var(--muted);margin-left:3px}

.note{font-size:10px;color:var(--muted);margin-bottom:12px;text-align:center;font-weight:500}

/* ── CTA ── */
.cta-box{background:var(--text);border-radius:16px;padding:24px 20px;text-align:center;margin-top:20px}
.cta-title{font-weight:800;font-size:16px;margin-bottom:6px;color:#fff}
.cta-sub{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:18px;line-height:1.6;font-weight:500}
.btn-cta{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:0;padding:12px 28px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,184,122,.35)}
.btn-cta:hover{background:var(--accent-2);box-shadow:0 4px 14px rgba(0,184,122,.4)}

/* ── Footer ── */
footer{background:var(--footer-bg);margin-top:64px;padding:20px;text-align:center;color:var(--footer-text);font-size:11px;font-weight:500}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="https://voltfox.io">
      <div class="logo-mark">V</div>Voltfox
    </a>
    <div class="nav-right">
      <span class="badge" id="headerBadge">CBAM Quick Calculator</span>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btnEN" onclick="setLang('en')">EN</button>
        <button class="lang-btn"        id="btnTR" onclick="setLang('tr')">TR</button>
      </div>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-eyebrow" id="heroEyebrow"></div>
  <h1 id="heroTitle"></h1>
  <p  id="heroSub"></p>
</div>

<div class="wrap">
<div class="layout">

  <!-- INPUT CARD -->
  <div class="card">

    <div class="sec-label" id="lblProduct"></div>

    <div class="row2">
      <div class="field">
        <label id="lblCountry"></label>
        <select id="country" onchange="onCountryChange()"></select>
      </div>
      <div class="field">
        <label id="lblCn"></label>
        <select id="cnCode" onchange="onCnChange()"></select>
      </div>
    </div>

    <div class="cn-strip" id="cnStrip">
      <div class="cn-row"><span class="cn-k" id="csLblTotal"></span><span class="cn-v" id="csTotal">—</span></div>
      <div class="cn-row"><span class="cn-k" id="csLblDirect"></span><span class="cn-v" id="csDirect">—</span></div>
      <div class="cn-row"><span class="cn-k" id="csLblIndirect"></span><span class="cn-v" id="csIndirect">—</span></div>
    </div>

    <div class="sec-label" id="lblProdSec"></div>

    <div class="field">
      <label id="lblProdVol"></label>
      <input type="number" id="prodVol" value="50000" min="1" oninput="recalc()"/>
    </div>

    <div class="sec-label" id="lblScope1Sec"></div>

    <div class="field">
      <label id="lblScope1"></label>
      <input type="number" id="scope1" oninput="scope1UserEdited=true; recalc()"/>
      <div class="hint" id="hintScope1"></div>
    </div>

    <div class="sec-label" id="lblElecSec"></div>

    <div class="row2">
      <div class="field">
        <label id="lblElecKwh"></label>
        <input type="number" id="elecKwh" value="15000000" oninput="recalc()"/>
      </div>
      <div class="field">
        <label id="lblGridEf"></label>
        <input type="number" id="gridEf" value="0.474" step="0.001" oninput="recalc()"/>
        <div class="hint" id="gridHint"></div>
      </div>
    </div>

    <div class="field">
      <label id="lblCarbonP"></label>
      <input type="number" id="carbonPrice" value="65" min="1" oninput="recalc()"/>
      <div class="hint" id="hintCarbonP"></div>
    </div>

    <div class="sec-label" id="lblSliderSec"></div>
    <div class="slider-wrap">
      <div class="slider-top">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--accent)" id="sliderTitle"></div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px" id="sliderSub"></div>
        </div>
        <div class="slider-pct"><span id="matchDisplay">75</span><sup style="font-size:16px;font-weight:700">%</sup></div>
      </div>
      <input type="range" id="matchSlider" min="0" max="100" value="75" step="1"
        oninput="document.getElementById('matchDisplay').textContent=this.value; recalc()"/>
      <div class="ticks"><span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span></div>
      <div class="ef-row">
        <span id="effEfLblText"></span>
        <span id="effEfLabel" style="color:var(--accent);font-weight:700">—</span>
      </div>
      <div class="ef-track"><div class="ef-fill" id="efFill" style="width:100%;background:var(--warn)"></div></div>
    </div>

  </div><!-- /input card -->

  <!-- RESULTS CARD -->
  <div class="card">
    <div id="resEmpty" class="res-empty">
      <div class="icon">⚡</div>
      <span id="emptyText"></span>
    </div>
    <div id="resContent" style="display:none">

      <div class="savings-box">
        <div class="sav-label" id="savLbl"></div>
        <div class="sav-amount" id="savAmount">€ 0</div>
        <div class="sav-sub" id="savSub">—</div>
      </div>

      <div class="bar-section" id="barSection"></div>

      <div class="see-trio">
        <div class="see-card card-red">
          <div class="sc-lbl" id="rLblDefault"></div>
          <div class="sc-val" id="rDefault">—</div>
          <div class="sc-unit">tCO₂e/t</div>
          <div class="sc-sub" id="rSubDefault"></div>
        </div>
        <div class="see-card card-green">
          <div class="sc-lbl" id="rLblActual"></div>
          <div class="sc-val" id="rActual">—</div>
          <div class="sc-unit">tCO₂e/t</div>
          <div class="sc-sub" id="rDiff">—</div>
        </div>
      </div>

      <div class="kpi-list">
        <div class="kpi"><span class="k" id="kpiLblCostDef"></span><span class="v" id="costDefault">—</span></div>
        <div class="kpi"><span class="k" id="kpiLblCostAct"></span><span class="v" id="costActual" style="color:var(--accent)">—</span></div>
        <div class="kpi"><span class="k" id="kpiLblS1"></span><span class="v" id="kpiS1">—</span></div>
        <div class="kpi"><span class="k" id="kpiLblS2"></span><span class="v" id="kpiS2">—</span></div>
        <div class="kpi"><span class="k" id="kpiLblRed"></span><span class="v" id="kpiReduction" style="color:var(--accent)">—</span></div>
      </div>
      <div class="note" id="noteText"></div>

    </div>

    <div class="cta-box">
      <div class="cta-title" id="ctaTitle"></div>
      <div class="cta-sub"   id="ctaSub"></div>
      <a class="btn-cta" href="https://voltfox.io/contact" id="ctaBtn"></a>
    </div>

  </div><!-- /results card -->
</div><!-- /layout -->
</div><!-- /wrap -->

<footer id="footerText"></footer>

    barLblBase:    "Baseline 0%",
    barLblVoltfox: pct => `Voltfox %${pct}`,
    noteText:      "* Gösterge niteliğindedir — SEE × Üretim × Karbon Fiyatı. Gerçek CBAM beyanı ithalatçının sorumluluğundadır.",
    ctaTitle:      "Doğrulanmış Gerçek Emisyon Verisi mi İstiyorsunuz?",
    ctaSub:        "Voltfox, sayaç verileriniz, GEC/EAC kaydı ve üretim sistemlerinizle doğrudan entegre olarak dakikalar içinde tam denetlenebilir bir CBAM raporu üretir.",
    ctaBtn:        "Ücretsiz Demo Alın →",
    footer:        "Voltfox · CBAM Hızlı Hesaplayıcı · Veri: DVs as adopted_v20260204.xlsx · AB Tüzüğü 2023/1773",
    yearUnit:      "/ yıl",
  }
};

const COUNTRY_EF = {
  "Türkiye":0.474,"Germany":0.385,"Poland":0.773,"France":0.052,
  "Italy":0.333,"Spain":0.191,"Netherlands":0.371,"Belgium":0.175,
  "Czechia":0.621,"Romania":0.273,"Hungary":0.221,"Bulgaria":0.396,
  "Austria":0.126,"Sweden":0.013,"Finland":0.073,"Denmark":0.155,
  "Greece":0.561,"Portugal":0.205,"Slovakia":0.196,"Croatia":0.195,
  "Ukraine":0.302,"Russia":0.322,"China":0.581,"India":0.708,
  "United Kingdom":0.233,"United States":0.386,
};

let lang = "en";
let scope1UserEdited = false;

// ── Apply translations ────────────────────────────────────────────────────────
function applyLang(l){
  const t = T[l];
  document.documentElement.lang = l;
  document.title = t.title + " | Voltfox";
  document.getElementById("headerBadge").textContent  = t.title;
  document.getElementById("heroEyebrow").textContent  = t.heroEyebrow;
  document.getElementById("heroTitle").innerHTML      = t.heroTitle;
  document.getElementById("heroSub").textContent      = t.heroSub;
  document.getElementById("lblProduct").textContent   = t.lblProduct;
  document.getElementById("lblCountry").textContent   = t.lblCountry;
  document.getElementById("lblCn").textContent        = t.lblCn;
  document.getElementById("csLblTotal").textContent   = t.csLblTotal;
  document.getElementById("csLblDirect").textContent  = t.csLblDirect;
  document.getElementById("csLblIndirect").textContent= t.csLblIndirect;
  document.getElementById("lblProdSec").textContent   = t.lblProdSec;
  document.getElementById("lblProdVol").textContent   = t.lblProdVol;
  document.getElementById("lblScope1Sec").textContent = t.lblScope1Sec;
  document.getElementById("lblScope1").textContent    = t.lblScope1;
  document.getElementById("hintScope1").textContent   = t.hintScope1;
  document.getElementById("scope1").placeholder       = t.scope1Placeholder;
  document.getElementById("lblElecSec").textContent   = t.lblElecSec;
  document.getElementById("lblElecKwh").textContent   = t.lblElecKwh;
  document.getElementById("lblGridEf").textContent    = t.lblGridEf;
  document.getElementById("lblCarbonP").textContent   = t.lblCarbonP;
  document.getElementById("hintCarbonP").textContent  = t.hintCarbonP;
  document.getElementById("lblSliderSec").textContent = t.lblSliderSec;
  document.getElementById("sliderTitle").textContent  = t.sliderTitle;
  document.getElementById("sliderSub").textContent    = t.sliderSub;
  document.getElementById("effEfLblText").textContent = t.effEfLblText;
  document.getElementById("emptyText").textContent    = t.emptyText;
  document.getElementById("savLbl").textContent       = t.savLbl;
  document.getElementById("rLblDefault").textContent  = t.rLblDefault;
  document.getElementById("rLblActual").textContent   = t.rLblActual;
  document.getElementById("rSubDefault").textContent  = t.rSubDefault;
  document.getElementById("kpiLblCostDef").textContent= t.kpiLblCostDef;
  document.getElementById("kpiLblCostAct").textContent= t.kpiLblCostAct;
  document.getElementById("kpiLblS1").textContent     = t.kpiLblS1;
  document.getElementById("kpiLblS2").textContent     = t.kpiLblS2;
  document.getElementById("kpiLblRed").textContent    = t.kpiLblRed;
  document.getElementById("noteText").textContent     = t.noteText;
  document.getElementById("ctaTitle").textContent     = t.ctaTitle;
  document.getElementById("ctaSub").textContent       = t.ctaSub;
  document.getElementById("ctaBtn").textContent       = t.ctaBtn;
  document.getElementById("footerText").textContent   = t.footer;

  // Grid hint
  const country = document.getElementById("country").value;
  document.getElementById("gridHint").textContent =
    country ? t.gridHintCountry + " (" + country + ")" : t.gridHintDefault;

  // Rebuild CN dropdowns with new labels
  rebuildCnDropdown();
  recalc();
}

function setLang(l){
  lang = l;
  document.getElementById("btnEN").classList.toggle("active", l==="en");
  document.getElementById("btnTR").classList.toggle("active", l==="tr");
  applyLang(l);
}

// ── Dropdown builders ─────────────────────────────────────────────────────────
function populateCountries(){
  if(!DATA){ console.warn("CBAM_DATA not loaded"); return; }
  const sel = document.getElementById("country");
  sel.innerHTML = "";
  const sorted  = Object.keys(DATA.countries).sort();
  const ordered = ["Türkiye", ...sorted.filter(c=>c!=="Türkiye")];
  ordered.forEach(c=>{
    const opt = document.createElement("option");
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
  onCountryChange();
}

function rebuildCnDropdown(){
  const country = document.getElementById("country").value;
  if(!country || !DATA) return;
  const currentCn  = document.getElementById("cnCode").value;
  const rows       = DATA.countries[country] || [];
  const t          = T[lang];
  const sel        = document.getElementById("cnCode");
  sel.innerHTML    = "";

  const activeRows = rows.filter(r=>!r[7]);
  const exemptRows = rows.filter(r=> r[7]);

  function buildGroup(list, label, exempt){
    if(!list.length) return;
    const grp = document.createElement("optgroup"); grp.label = label;
    list.forEach(r=>{
      const opt  = document.createElement("option");
      opt.value  = r[0];
      const desc = DATA.cn[r[0]]?.d || "";
      opt.textContent = r[0] + (desc?" — "+desc.slice(0,56):"") + (exempt?t.optExemptSufx:"");
      opt.dataset.direct   = r[1] ?? "";
      opt.dataset.indirect = exempt ? "" : (r[2] ?? "");
      opt.dataset.total    = r[3] ?? "";
      opt.dataset.y2026    = r[4] ?? "";
      opt.dataset.exempt   = exempt ? "true" : "false";
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  }

  buildGroup(activeRows, t.optGrpActive,  false);
  buildGroup(exemptRows, t.optGrpExempt,  true);

  // Restore previous selection if possible
  if(currentCn) sel.value = currentCn;
  onCnChange();
}

function onCountryChange(){
  const country = document.getElementById("country").value;
  const ef = COUNTRY_EF[country];
  if(ef){
    document.getElementById("gridEf").value = ef;
    document.getElementById("gridHint").textContent =
      T[lang].gridHintCountry + " (" + country + ")";
  }
  rebuildCnDropdown();
}

function onCnChange(){
  const sel = document.getElementById("cnCode");
  const opt = sel.options[sel.selectedIndex];
  if(!opt) return;

  const direct   = parseFloat(opt.dataset.direct)   || null;
  const indirect = parseFloat(opt.dataset.indirect) || null;
  const total    = parseFloat(opt.dataset.total)    || null;
  const y2026    = parseFloat(opt.dataset.y2026)    || null;
  const exempt   = opt.dataset.exempt === "true";

  const strip = document.getElementById("cnStrip");
  if(total || direct){
    strip.classList.add("show");
    document.getElementById("csTotal").textContent    = (y2026??total)!=null ? (y2026??total).toFixed(4)+" tCO₂e/t" : "—";
    document.getElementById("csDirect").textContent   = direct!=null  ? direct.toFixed(4)+" tCO₂e/t" : "—";
    document.getElementById("csIndirect").textContent = exempt ? "N/A" : (indirect!=null ? indirect.toFixed(4)+" tCO₂e/t" : "—");
  } else {
    strip.classList.remove("show");
  }

  if(!scope1UserEdited && direct){
    const prodVol = +document.getElementById("prodVol").value || 50000;
    document.getElementById("scope1").value = (direct * prodVol).toFixed(0);
  }
  recalc();
}

// ── Calculation ───────────────────────────────────────────────────────────────
function fmt(n, dec=2){
  const locale = lang === "tr" ? "tr-TR" : "en-US";
  return n.toLocaleString(locale,{maximumFractionDigits:dec,minimumFractionDigits:dec});
}

function recalc(){
  const sel    = document.getElementById("cnCode");
  const opt    = sel.options[sel.selectedIndex];
  if(!opt || !opt.dataset.total) return;

  const exempt   = opt.dataset.exempt === "true";
  const y2026    = parseFloat(opt.dataset.y2026)  || parseFloat(opt.dataset.total) || 0;
  const direct   = parseFloat(opt.dataset.direct) || 0;
  const defSEE   = y2026;

  const prodVol  = +document.getElementById("prodVol").value   || 0;
  const elecKwh  = +document.getElementById("elecKwh").value   || 0;
  const gridEf   = +document.getElementById("gridEf").value    || 0.474;
  const carbonP  = +document.getElementById("carbonPrice").value || 65;
  const matchPct = +document.getElementById("matchSlider").value;
  const renewEf  = 0.02;

  const elecMwh  = elecKwh / 1000;
  const effEf    = exempt ? gridEf : (matchPct/100 * renewEf + (1 - matchPct/100) * gridEf);

  // EF bar
  document.getElementById("effEfLabel").textContent = effEf.toFixed(4) + " tCO₂/MWh";
  const fillPct = gridEf > 0 ? effEf / gridEf * 100 : 0;
  const fill    = document.getElementById("efFill");
  fill.style.width      = fillPct.toFixed(1) + "%";
  fill.style.background = matchPct === 0 || exempt
    ? "var(--warn)"
    : `linear-gradient(90deg,var(--accent),hsl(162,${60+matchPct/2}%,${35+matchPct/5}%))`;

  if(prodVol <= 0 || defSEE <= 0) return;

  const s1Val    = +document.getElementById("scope1").value;
  const scope1   = s1Val > 0 ? s1Val : direct * prodVol;

  const s2Baseline  = elecMwh * gridEf;
  const s2Actual    = exempt ? s2Baseline : elecMwh * effEf;
  const s2Reduction = s2Baseline - s2Actual;

  const seeActual   = (scope1 + s2Actual)   / prodVol;
  const seeBaseline = (scope1 + s2Baseline) / prodVol;

  const costDefault = defSEE      * prodVol * carbonP;
  const costActual  = seeActual   * prodVol * carbonP;
  const savings     = costDefault - costActual;

  const diffPct  = defSEE > 0 ? (defSEE - seeActual) / defSEE * 100 : 0;

  const t = T[lang];
  const yr = t.yearUnit;

  document.getElementById("resEmpty").style.display   = "none";
  document.getElementById("resContent").style.display = "block";

  document.getElementById("savAmount").textContent = "€ " + fmt(savings, 0);
  document.getElementById("savSub").textContent    = t.savSubTpl(fmt(diffPct,1), carbonP);

  document.getElementById("rDefault").textContent  = fmt(defSEE,4);
  document.getElementById("rActual").textContent   = fmt(seeActual,4);
  document.getElementById("rDiff").textContent     = t.rDiffTpl(fmt(diffPct,1));

  document.getElementById("costDefault").innerHTML  = "€ "+fmt(costDefault,0)+'<small>'+yr+'</small>';
  document.getElementById("costActual").innerHTML   = "€ "+fmt(costActual,0)+'<small>'+yr+'</small>';
  document.getElementById("kpiS1").innerHTML        = fmt(scope1,0)+'<small>tCO₂</small>';
  document.getElementById("kpiS2").innerHTML        = fmt(s2Actual,0)+'<small>tCO₂</small>';
  document.getElementById("kpiReduction").innerHTML = fmt(s2Reduction,0)+'<small>tCO₂ (−'+fmt(s2Reduction/Math.max(s2Baseline,0.0001)*100,1)+'%)</small>';

  const maxSEE = Math.max(defSEE, seeBaseline, seeActual) * 1.06 || 1;
  const scenarios = [
    { lbl:t.barLblDefault,        see:defSEE,      color:"var(--danger)" },
    { lbl:t.barLblBase,           see:seeBaseline, color:"var(--warn)"   },
    { lbl:t.barLblVoltfox(matchPct), see:seeActual, color:"var(--accent)"},
  ];
  document.getElementById("barSection").innerHTML = scenarios.map(s=>{
    const pct = (s.see / maxSEE * 100).toFixed(1);
    return `<div class="bar-row">
      <div class="bar-lbl">${s.lbl}</div>
      <div class="bar-outer"><div class="bar-inner" style="width:${pct}%;background:${s.color}">
        <span>${s.see.toFixed(4)}</span>
      </div></div>
    </div>`;
  }).join("");
}

// ── Init ──────────────────────────────────────────────────────────────────────
populateCountries();
applyLang("en");
</script>
</body>
</html>
