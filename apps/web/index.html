<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voltfox — Emisyon Yönetim Platformu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg:           #f4fbf8;
        --panel:        #ffffff;
        --panel-2:      #eef7f3;
        --accent:       #00b87a;
        --accent-2:     #009966;
        --accent-light: #e6f9f2;
        --danger:       #e05252;
        --warn:         #d97706;
        --info:         #2563eb;
        --text:         #0a1f1a;
        --text-2:       #1a3530;
        --muted:        #5c7a72;
        --border:       #d4ece4;
        --border-2:     #c0ddd5;
        --nav-bg:       #0a1f1a;
        --shadow:       0 2px 12px rgba(0,40,30,.07), 0 1px 3px rgba(0,40,30,.05);
        --shadow-md:    0 6px 24px rgba(0,40,30,.10), 0 2px 6px rgba(0,40,30,.06);
        --radius-sm:    9px;
        --radius:       12px;
        --radius-lg:    16px;
        --radius-pill:  999px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Manrope", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
      }

      input, select, button, textarea {
        font-family: inherit;
      }

      input[type="number"], input[type="text"], input[type="email"], select, textarea {
        width: 100%;
        padding: 10px 12px;
        background: var(--panel-2);
        border: 1px solid var(--border-2);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        outline: none;
        transition: border-color .15s, box-shadow .15s;
      }

      input:focus, select:focus, textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(0,184,122,.12);
      }

      a { color: var(--accent-2); }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
